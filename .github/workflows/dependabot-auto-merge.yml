name: Auto-merge Dependabot PRs

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  process-pr-event:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    uses: ./.github/workflows/process-dependabot-pr.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
    secrets: inherit

  discover-open-prs:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      has_prs: ${{ steps.find-prs.outputs.has_prs }}
      pr_numbers_json: ${{ steps.find-prs.outputs.pr_numbers_json }}

    steps:
      - name: Setup GitHub CLI
        run: gh --version

      - name: Find open Dependabot PRs
        id: find-prs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBERS_JSON=$(gh pr list \
            --state open \
            --search "is:pr is:open author:app/dependabot" \
            --json number \
            --jq '[.[].number]')

          if [ "$PR_NUMBERS_JSON" = "[]" ]; then
            echo "has_prs=false" >> $GITHUB_OUTPUT
            echo "No open Dependabot PRs found"
            exit 0
          fi

          echo "has_prs=true" >> $GITHUB_OUTPUT
          echo "pr_numbers_json=$PR_NUMBERS_JSON" >> $GITHUB_OUTPUT

  process-open-prs:
    needs: discover-open-prs
    if: needs.discover-open-prs.outputs.has_prs == 'true'
    strategy:
      fail-fast: false
      matrix:
        pr_number: ${{ fromJson(needs.discover-open-prs.outputs.pr_numbers_json) }}
    uses: ./.github/workflows/process-dependabot-pr.yml
    with:
      pr_number: ${{ matrix.pr_number }}
    secrets: inherit
